name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ──────────────────────────────────────────
  # Job 1: 后端测试
  # 每次 push/PR 必跑，是最重要的安全网
  # ──────────────────────────────────────────
  backend-test:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          cd backend
          pip install -e ".[test]"

      - name: Run tests
        run: |
          cd backend
          python3 -m pytest tests/ -v --tb=short \
            --junit-xml=../test-results/backend.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: test-results/backend.xml
          retention-days: 7

  # ──────────────────────────────────────────
  # Job 2: 前端构建 + 类型检查
  # 确保 TypeScript 编译通过、构建不报错
  # ──────────────────────────────────────────
  frontend-build:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend-v3/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend-v3
          npm ci

      - name: Type check (vue-tsc)
        run: |
          cd frontend-v3
          npx vue-tsc --noEmit

      - name: Build
        run: |
          cd frontend-v3
          npm run build

      - name: Verify build output
        run: |
          test -f frontend-v3/dist/index.html || (echo "❌ index.html missing" && exit 1)
          echo "✅ Build output verified"

  # ──────────────────────────────────────────
  # Job 3: 文档与版本一致性检查
  # 只在相关文件变更时触发，避免每次都跑
  # ──────────────────────────────────────────
  doc-consistency:
    name: Doc & Version Consistency
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check version consistency
        run: make check-version

      - name: Check env var naming conventions
        run: |
          bash scripts/check_doc_consistency.sh

      - name: Show doc checklist on PR
        if: github.event_name == 'pull_request'
        run: |
          python3 scripts/doc-sync/doc_checklist.py --staged || true

      - name: Comment PR with doc checklist on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## ❌ 文档一致性检查失败',
                '',
                '**可能的原因：**',
                '- 版本号已更新，但文档未同步（README/CLAUDE.md/INDEX.md 等）',
                '- CHANGELOG.md 缺少当前版本记录',
                '- 环境变量命名不规范（应使用 `__` 分隔符）',
                '',
                '**修复方法：**',
                '```bash',
                'make sync-version-docs   # 自动同步版本引用',
                'make check-doc-sync      # 完整检查',
                '```',
              ].join('\n')
            })
