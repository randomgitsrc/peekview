name: Publish MCP Server to npm

on:
  push:
    tags: ['mcp-v*']
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.2.0) — must match package.json"
        required: false
        type: string

jobs:
  test:
    name: Test on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20']
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: cd packages/mcp-server && npm ci

      - name: Build
        run: cd packages/mcp-server && npm run build

      - name: Run unit tests
        run: cd packages/mcp-server && npm run test:unit

  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    environment: npm
    concurrency:
      group: npm-publish
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: packages/mcp-server/package-lock.json

      - name: Install dependencies
        run: cd packages/mcp-server && npm ci

      - name: Build
        run: cd packages/mcp-server && npm run build

      - name: Run unit tests
        run: cd packages/mcp-server && npm run test:unit

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/mcp-v')
        run: |
          cd packages/mcp-server
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#mcp-v}"
          echo "Tag version: $TAG_VERSION"
          echo "package.json version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) != package.json version ($PKG_VERSION)"
            echo "Please update package.json version before tagging."
            exit 1
          fi

      - name: Verify version matches input
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        run: |
          cd packages/mcp-server
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Input version: ${{ inputs.version }}"
          echo "package.json version: $PKG_VERSION"
          if [ "${{ inputs.version }}" != "$PKG_VERSION" ]; then
            echo "ERROR: inputs.version (${{ inputs.version }}) != package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Publish to npm
        run: cd packages/mcp-server && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
