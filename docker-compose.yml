version: '3.8'

services:
  peekview:
    image: peekview:latest
    # Build from backend directory (run from project root)
    # docker-compose up -d
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - peekview-data:/data
    environment:
      - PEEKVIEW_STORAGE__DATA_DIR=/data
      - PEEKVIEW_STORAGE__DB_PATH=/data/peekview.db
      - PEEKVIEW_SERVER__HOST=0.0.0.0
      - PEEKVIEW_SERVER__PORT=8080

  mcp-server:
    image: peekview/mcp-server:latest
    build:
      context: ./packages/mcp-server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PEEKVIEW_URL=http://peekview:8080
      - PEEKVIEW_PUBLIC_URL=${PEEKVIEW_PUBLIC_URL}   # Required: public URL
      - PEEKVIEW_API_KEY=${PEEKVIEW_API_KEY}
      - MCP_TOKEN=${MCP_TOKEN}
      - MCP_PORT=3000
      - MCP_HOST=0.0.0.0
      - MCP_CORS_ORIGINS=*
      - LOG_LEVEL=info
    depends_on:
      - peekview
    restart: unless-stopped

volumes:
  peekview-data:
