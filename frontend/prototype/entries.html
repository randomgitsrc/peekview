<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peek - Entries</title>
  <script>
    (function() {
      const saved = localStorage.getItem('peek-theme')
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
      const theme = saved || (prefersDark ? 'dark' : 'light')
      document.documentElement.setAttribute('data-theme', theme)
    })()
  </script>
  <style>
    /* ===== Design Tokens ===== */
    :root {
      --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
      --space-5: 20px; --space-6: 24px; --space-7: 32px; --space-8: 48px;
      --font-xs: 12px; --font-sm: 14px; --font-md: 16px; --font-lg: 20px; --font-xl: 24px;
      --radius-sm: 4px; --radius-md: 6px; --radius-lg: 8px; --radius-xl: 12px;
      --transition-fast: 150ms ease;
      --header-height: 56px;
    }

    [data-theme="light"] {
      --accent-color: #0969DA; --accent-hover: #0550AE; --accent-light: rgba(9, 105, 218, 0.1);
      --bg-primary: #FFFFFF; --bg-secondary: #F6F8FA; --bg-tertiary: #F3F4F6;
      --border-color: #D0D7DE; --border-hover: #8C959F;
      --text-primary: #1F2328; --text-secondary: #656D76; --text-tertiary: #8C959F;
      --tag-bg: rgba(9, 105, 218, 0.1); --tag-text: #0969DA;
      --shadow-sm: 0 1px 2px rgba(31, 35, 40, 0.04);
      --shadow-md: 0 3px 6px rgba(31, 35, 40, 0.08);
    }

    [data-theme="dark"] {
      --accent-color: #3B82F6; --accent-hover: #2563EB; --accent-light: rgba(59, 130, 246, 0.15);
      --bg-primary: #0D1117; --bg-secondary: #161B22; --bg-tertiary: #21262D;
      --border-color: #30363D; --border-hover: #8B949E;
      --text-primary: #E6EDF3; --text-secondary: #8B949E; --text-tertiary: #6E7681;
      --tag-bg: rgba(59, 130, 246, 0.2); --tag-text: #58A6FF;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg-primary); color: var(--text-primary);
      line-height: 1.5; -webkit-font-smoothing: antialiased;
    }

    /* ===== Header ===== */
    .header {
      height: var(--header-height); background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color); display: flex;
      align-items: center; padding: 0 var(--space-5); gap: var(--space-3);
      position: sticky; top: 0; z-index: 100;
    }
    .header-logo {
      font-size: var(--font-xl); font-weight: 700; color: var(--accent-color);
      text-decoration: none; display: flex; align-items: center; gap: var(--space-2);
    }
    .header-logo svg { width: 28px; height: 28px; }
    .header-nav { flex: 1; display: flex; align-items: center; gap: var(--space-4); }
    .nav-link {
      color: var(--text-secondary); text-decoration: none; font-size: var(--font-sm);
      padding: var(--space-2) var(--space-3); border-radius: var(--radius-md);
      transition: all var(--transition-fast);
    }
    .nav-link:hover { color: var(--text-primary); background: var(--bg-tertiary); }
    .nav-link.active { color: var(--text-primary); font-weight: 500; }
    .header-actions { display: flex; gap: var(--space-3); align-items: center; }
    .theme-toggle {
      width: 40px; height: 24px; background: var(--bg-tertiary);
      border: 1px solid var(--border-color); border-radius: 999px;
      position: relative; cursor: pointer;
    }
    .theme-toggle::after {
      content: '☀️'; position: absolute; top: 1px; left: 1px; width: 20px; height: 20px;
      background: var(--bg-primary); border-radius: 50%; font-size: 11px;
      display: flex; align-items: center; justify-content: center;
      transition: transform var(--transition-fast);
    }
    [data-theme="dark"] .theme-toggle::after { transform: translateX(18px); content: '🌙'; }

    /* ===== Main Layout ===== */
    .main-container {
      max-width: 1200px; margin: 0 auto; padding: var(--space-6) var(--space-5);
    }

    /* ===== Search Section ===== */
    .search-section {
      margin-bottom: var(--space-6);
    }
    .search-box {
      display: flex; gap: var(--space-3); align-items: center;
      background: var(--bg-secondary); border: 1px solid var(--border-color);
      border-radius: var(--radius-lg); padding: var(--space-3) var(--space-4);
      margin-bottom: var(--space-4);
    }
    .search-box:focus-within {
      border-color: var(--accent-color); box-shadow: 0 0 0 2px var(--accent-light);
    }
    .search-icon { color: var(--text-tertiary); }
    .search-input {
      flex: 1; border: none; background: transparent;
      color: var(--text-primary); font-size: var(--font-md);
      outline: none;
    }
    .search-input::placeholder { color: var(--text-tertiary); }
    .search-clear {
      color: var(--text-tertiary); cursor: pointer; padding: var(--space-1);
      border-radius: var(--radius-sm); display: none;
    }
    .search-clear:hover { color: var(--text-secondary); background: var(--bg-tertiary); }
    .search-clear.visible { display: block; }

    /* ===== Tags Filter ===== */
    .tags-filter {
      display: flex; gap: var(--space-2); flex-wrap: wrap; align-items: center;
    }
    .filter-label {
      font-size: var(--font-sm); color: var(--text-secondary); margin-right: var(--space-2);
    }
    .tag {
      display: inline-flex; align-items: center; padding: 4px 10px;
      background: var(--tag-bg); color: var(--tag-text);
      border-radius: 999px; font-size: var(--font-xs); font-weight: 500;
      cursor: pointer; transition: all var(--transition-fast);
      border: 1px solid transparent;
    }
    .tag:hover { opacity: 0.8; }
    .tag.active {
      background: var(--accent-color); color: var(--bg-primary);
    }
    .tag-clear {
      color: var(--text-secondary); font-size: var(--font-xs);
      cursor: pointer; padding: var(--space-1) var(--space-2);
    }
    .tag-clear:hover { color: var(--accent-color); }

    /* ===== Stats Bar ===== */
    .stats-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: var(--space-5); padding-bottom: var(--space-4);
      border-bottom: 1px solid var(--border-color);
    }
    .stats-text {
      font-size: var(--font-sm); color: var(--text-secondary);
    }
    .stats-text strong { color: var(--text-primary); }
    .sort-select {
      padding: var(--space-2) var(--space-3); border: 1px solid var(--border-color);
      border-radius: var(--radius-md); background: var(--bg-secondary);
      color: var(--text-primary); font-size: var(--font-sm); cursor: pointer;
    }

    /* ===== Entry Cards Grid ===== */
    .entries-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: var(--space-5);
    }

    /* ===== Entry Card ===== */
    .entry-card {
      background: var(--bg-secondary); border: 1px solid var(--border-color);
      border-radius: var(--radius-lg); padding: var(--space-5);
      transition: all var(--transition-fast); cursor: pointer;
    }
    .entry-card:hover {
      border-color: var(--border-hover); box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    .entry-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: var(--space-3);
    }
    .entry-title {
      font-size: var(--font-md); font-weight: 600; color: var(--text-primary);
      line-height: 1.4; flex: 1; margin-right: var(--space-3);
      overflow: hidden; text-overflow: ellipsis; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .entry-status {
      display: inline-flex; align-items: center; padding: 2px 8px;
      border-radius: var(--radius-sm); font-size: var(--font-xs); font-weight: 500;
    }
    .entry-status.active {
      background: rgba(16, 185, 129, 0.15); color: #10B981;
    }
    .entry-status.archived {
      background: var(--bg-tertiary); color: var(--text-tertiary);
    }
    .entry-summary {
      font-size: var(--font-sm); color: var(--text-secondary);
      line-height: 1.6; margin-bottom: var(--space-4);
      overflow: hidden; text-overflow: ellipsis; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      min-height: 44px;
    }
    .entry-meta {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: var(--space-3);
    }
    .entry-tags { display: flex; gap: var(--space-2); flex-wrap: wrap; }
    .entry-tag {
      font-size: var(--font-xs); color: var(--text-tertiary);
      background: var(--bg-tertiary); padding: 2px 6px; border-radius: var(--radius-sm);
    }
    .entry-info {
      display: flex; gap: var(--space-4); font-size: var(--font-xs);
      color: var(--text-tertiary);
    }
    .entry-info-item { display: flex; align-items: center; gap: var(--space-1); }

    /* ===== Empty State ===== */
    .empty-state {
      text-align: center; padding: var(--space-8) var(--space-5);
    }
    .empty-icon {
      width: 64px; height: 64px; margin: 0 auto var(--space-5);
      color: var(--text-tertiary); opacity: 0.5;
    }
    .empty-title {
      font-size: var(--font-lg); font-weight: 600; color: var(--text-primary);
      margin-bottom: var(--space-2);
    }
    .empty-desc {
      font-size: var(--font-sm); color: var(--text-secondary);
      max-width: 400px; margin: 0 auto;
    }

    /* ===== Pagination ===== */
    .pagination {
      display: flex; justify-content: center; align-items: center;
      gap: var(--space-2); margin-top: var(--space-8); padding-top: var(--space-6);
      border-top: 1px solid var(--border-color);
    }
    .page-btn {
      min-width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border-color); border-radius: var(--radius-md);
      background: var(--bg-secondary); color: var(--text-secondary);
      font-size: var(--font-sm); cursor: pointer; transition: all var(--transition-fast);
    }
    .page-btn:hover:not(:disabled) {
      border-color: var(--border-hover); color: var(--text-primary);
    }
    .page-btn.active {
      background: var(--accent-color); border-color: var(--accent-color);
      color: var(--bg-primary);
    }
    .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .page-ellipsis { color: var(--text-tertiary); padding: 0 var(--space-2); }

    /* ===== Mobile Styles ===== */
    @media (max-width: 768px) {
      .header { padding: 0 var(--space-4); }
      .header-nav { display: none; }
      .main-container { padding: var(--space-4); }
      .entries-grid {
        grid-template-columns: 1fr; gap: var(--space-4);
      }
      .entry-card { padding: var(--space-4); }
      .stats-bar {
        flex-direction: column; gap: var(--space-3); align-items: flex-start;
      }
      .tags-filter { overflow-x: auto; flex-wrap: nowrap; padding-bottom: var(--space-2); }
      .tag { white-space: nowrap; }
    }

    @media (max-width: 480px) {
      .entry-meta { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <a href="#" class="header-logo">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      Peek
    </a>
    <nav class="header-nav">
      <a href="#" class="nav-link active">Entries</a>
      <a href="#" class="nav-link">Docs</a>
    </nav>
    <div class="header-actions">
      <div class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme"></div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-container">
    <!-- Search Section -->
    <section class="search-section">
      <div class="search-box">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" class="search-input" placeholder="Search entries..." id="searchInput" oninput="handleSearch(this.value)">
        <span class="search-clear" id="searchClear" onclick="clearSearch()">✕</span>
      </div>

      <!-- Tags Filter -->
      <div class="tags-filter" id="tagsFilter">
        <span class="filter-label">Filter by:</span>
        <span class="tag active" onclick="toggleTag(this, 'all')">All</span>
        <span class="tag" onclick="toggleTag(this, 'python')">#python</span>
        <span class="tag" onclick="toggleTag(this, 'cli')">#cli</span>
        <span class="tag" onclick="toggleTag(this, 'api')">#api</span>
        <span class="tag" onclick="toggleTag(this, 'docs')">#docs</span>
        <span class="tag" onclick="toggleTag(this, 'config')">#config</span>
        <span class="tag-clear" id="clearFilters" onclick="clearFilters()" style="display: none;">Clear filters</span>
      </div>
    </section>

    <!-- Stats Bar -->
    <div class="stats-bar">
      <span class="stats-text">Showing <strong>1-8</strong> of <strong>24</strong> entries</span>
      <select class="sort-select">
        <option>Newest first</option>
        <option>Oldest first</option>
        <option>Most files</option>
        <option>A-Z</option>
      </select>
    </div>

    <!-- Entries Grid -->
    <div class="entries-grid" id="entriesGrid">
      <!-- Entries will be rendered by JS -->
    </div>

    <!-- Empty State (hidden by default) -->
    <div class="empty-state" id="emptyState" style="display: none;">
      <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <h3 class="empty-title">No entries found</h3>
      <p class="empty-desc">Try adjusting your search or filters to find what you're looking for.</p>
    </div>

    <!-- Pagination -->
    <nav class="pagination" id="pagination">
      <button class="page-btn" disabled>←</button>
      <button class="page-btn active">1</button>
      <button class="page-btn">2</button>
      <button class="page-btn">3</button>
      <span class="page-ellipsis">...</span>
      <button class="page-btn">12</button>
      <button class="page-btn">→</button>
    </nav>
  </main>

  <script>
    // Mock entries data
    const entries = [
      {
        slug: 'fastapi-todo-api',
        title: 'FastAPI Todo API - Project Documentation',
        summary: 'A production-ready REST API for managing todo items built with FastAPI and SQLAlchemy. Includes CRUD endpoints, database models, and configuration.',
        tags: ['python', 'api', 'fastapi'],
        status: 'active',
        fileCount: 8,
        createdAt: '2026-04-23',
        expiresIn: '29 days'
      },
      {
        slug: 'react-dashboard',
        title: 'React Admin Dashboard Template',
        summary: 'Modern React admin dashboard with Tailwind CSS, featuring dark mode, charts, tables, and form components.',
        tags: ['react', 'typescript', 'ui'],
        status: 'active',
        fileCount: 24,
        createdAt: '2026-04-22',
        expiresIn: '28 days'
      },
      {
        slug: 'go-microservices',
        title: 'Go Microservices Architecture',
        summary: 'Sample microservices implementation in Go with gRPC, Docker, and Kubernetes deployment configs.',
        tags: ['go', 'microservices', 'docker'],
        status: 'active',
        fileCount: 15,
        createdAt: '2026-04-21',
        expiresIn: '27 days'
      },
      {
        slug: 'cli-tool-config',
        title: 'CLI Tool Configuration Reference',
        summary: 'Configuration options and examples for the internal CLI tooling used by the DevOps team.',
        tags: ['cli', 'config', 'yaml'],
        status: 'archived',
        fileCount: 3,
        createdAt: '2026-04-20',
        expiresIn: 'Expired'
      },
      {
        slug: 'rust-web-server',
        title: 'Rust Web Server Implementation',
        summary: 'High-performance web server built with Rust and Actix-web. Includes middleware, routing, and database integration.',
        tags: ['rust', 'api', 'performance'],
        status: 'active',
        fileCount: 12,
        createdAt: '2026-04-19',
        expiresIn: '25 days'
      },
      {
        slug: 'python-data-analysis',
        title: 'Python Data Analysis Scripts',
        summary: 'Jupyter notebooks and Python scripts for data processing, visualization, and machine learning pipelines.',
        tags: ['python', 'data', 'ml'],
        status: 'active',
        fileCount: 6,
        createdAt: '2026-04-18',
        expiresIn: '24 days'
      },
      {
        slug: 'vue-component-library',
        title: 'Vue 3 Component Library',
        summary: 'Reusable Vue 3 components with TypeScript support, Storybook documentation, and comprehensive tests.',
        tags: ['vue', 'typescript', 'ui'],
        status: 'active',
        fileCount: 32,
        createdAt: '2026-04-17',
        expiresIn: '23 days'
      },
      {
        slug: 'docker-compose-templates',
        title: 'Docker Compose Templates Collection',
        summary: 'Production-ready Docker Compose configurations for common stacks: Postgres, Redis, Nginx, etc.',
        tags: ['docker', 'config', 'devops'],
        status: 'archived',
        fileCount: 5,
        createdAt: '2026-04-16',
        expiresIn: 'Expired'
      }
    ];

    let currentFilter = 'all';
    let currentSearch = '';

    function renderEntries() {
      const grid = document.getElementById('entriesGrid');
      const emptyState = document.getElementById('emptyState');
      const pagination = document.getElementById('pagination');

      // Filter entries
      let filtered = entries;
      if (currentFilter !== 'all') {
        filtered = filtered.filter(e => e.tags.includes(currentFilter));
      }
      if (currentSearch) {
        const searchLower = currentSearch.toLowerCase();
        filtered = filtered.filter(e =>
          e.title.toLowerCase().includes(searchLower) ||
          e.summary.toLowerCase().includes(searchLower) ||
          e.tags.some(t => t.includes(searchLower))
        );
      }

      // Show/hide empty state and pagination
      if (filtered.length === 0) {
        grid.style.display = 'none';
        emptyState.style.display = 'block';
        pagination.style.display = 'none';
        return;
      }

      grid.style.display = 'grid';
      emptyState.style.display = 'none';
      pagination.style.display = 'flex';

      // Render cards
      grid.innerHTML = filtered.map(entry => `
        <article class="entry-card" onclick="viewEntry('${entry.slug}')">
          <div class="entry-header">
            <h2 class="entry-title">${entry.title}</h2>
            <span class="entry-status ${entry.status}">${entry.status}</span>
          </div>
          <p class="entry-summary">${entry.summary}</p>
          <div class="entry-meta">
            <div class="entry-tags">
              ${entry.tags.map(tag => `<span class="entry-tag">#${tag}</span>`).join('')}
            </div>
            <div class="entry-info">
              <span class="entry-info-item">
                📄 ${entry.fileCount} files
              </span>
              <span class="entry-info-item">
                🕐 ${entry.createdAt}
              </span>
              <span class="entry-info-item">
                ⏳ ${entry.expiresIn}
              </span>
            </div>
          </div>
        </article>
      `).join('');
    }

    function toggleTag(element, tag) {
      // Update active state
      document.querySelectorAll('.tags-filter .tag').forEach(t => t.classList.remove('active'));
      element.classList.add('active');

      currentFilter = tag;
      document.getElementById('clearFilters').style.display = tag === 'all' ? 'none' : 'inline';
      renderEntries();
    }

    function clearFilters() {
      currentFilter = 'all';
      document.querySelectorAll('.tags-filter .tag').forEach(t => t.classList.remove('active'));
      document.querySelector('.tags-filter .tag').classList.add('active');
      document.getElementById('clearFilters').style.display = 'none';
      renderEntries();
    }

    function handleSearch(value) {
      currentSearch = value.trim();
      document.getElementById('searchClear').classList.toggle('visible', value.length > 0);
      renderEntries();
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      handleSearch('');
    }

    function viewEntry(slug) {
      window.location.href = `index.html?entry=${slug}`;
    }

    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('peek-theme', next);
    }

    // Initial render
    renderEntries();
  </script>
</body>
</html>
